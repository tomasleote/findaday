<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Find A Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #030617;
            color: #F97316;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: white;
        }

        p {
            color: #94a3b8;
            max-width: 300px;
            line-height: 1.6;
        }

        .btn {
            margin-top: 32px;
            background-color: #F97316;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <img src="/logo.png" alt="Find A Day" class="logo">
    <h1>You're Offline</h1>
    <p>It looks like you've lost your connection. We'll be ready for you as soon as you're back online.</p>
    <a href="/" class="btn">Try Again</a>
    <script>
        // Check connectivity periodically
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>

</html>
